kind = "web"
previewPath = "/"
title = "جمعية غافة"
version = "1.0.0"
id = "artifacts/ghaafa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22796

[services.development]
run = "pnpm --filter @workspace/ghaafa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ghaafa", "run", "build" ]
publicDir = "artifacts/ghaafa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22796"
BASE_PATH = "/"
